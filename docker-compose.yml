services:
  db:
    image: postgres:16-alpine
    container_name: aqua-db-temp
    restart: unless-stopped
    environment:
      POSTGRES_DB: aqua_temp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aqua_temp"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aqua-frontend
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "
      bun install --ignore-scripts &&
      bunx prisma generate &&
      bunx prisma migrate deploy --config prisma/prisma.config.ts &&
      bun run dev -- --hostname 0.0.0.0
      "
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_bun_cache:/home/bun/.bun/install/cache
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: dev-secret-change-me-please-at-least-32-characters
      BETTER_AUTH_DATABASE_URL: postgres://postgres:postgres@db:5432/aqua_temp
      DATABASE_URL: postgresql://postgres:postgres@db:5432/aqua_temp
    depends_on:
      db:
        condition: service_healthy
      websockets:
        condition: service_started

  websockets:
    build:
      context: ./websockets
      dockerfile: Dockerfile
    container_name: aqua-websockets
    restart: unless-stopped
    working_dir: /app
    stdin_open: true
    tty: true
    command: >
      sh -c "
      bun install --ignore-scripts &&
      bun run dev
      "
    ports:
      - "4001:4001"
    volumes:
      - ./websockets:/app
      - backend_bun_cache:/home/bun/.bun/install/cache
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/aqua_temp
      PORT: 4001
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_bun_cache:
  backend_node_modules:
  backend_bun_cache:
  game_engine_node_modules:
  game_engine_bun_cache:
