services:
  db:
    image: postgres:16-alpine
    container_name: aqua-db-temp
    environment:
      POSTGRES_DB: aqua_temp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aqua_temp"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aqua-frontend
    working_dir: /app
    command: sh -c "pnpm install --frozen-lockfile --prefer-offline && pnpm auth:migrate && pnpm dev --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_pnpm_store:/pnpm/store
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: dev-secret-change-me-please-at-least-32-characters
      BETTER_AUTH_DATABASE_URL: postgres://postgres:postgres@db:5432/aqua_temp
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqua-backend
    working_dir: /app
    command: sh -c "pnpm install --frozen-lockfile --prefer-offline && pnpm prisma generate && pnpm dev"
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_pnpm_store:/pnpm/store
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/aqua_temp
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy

  game-engine:
    build:
      context: ./game-engine
      dockerfile: Dockerfile
    container_name: aqua-game-engine
    working_dir: /app
    command: sh -c "if [ -f package.json ]; then pnpm install --frozen-lockfile --prefer-offline && pnpm dev; else echo 'Game-engine waiting for code'; tail -f /dev/null; fi"
    ports:
      - "5000:5000"
    volumes:
      - ./game-engine:/app
      - game_engine_node_modules:/app/node_modules
      - game_engine_pnpm_store:/pnpm/store
    environment:
      NODE_ENV: development

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_pnpm_store:
  backend_node_modules:
  backend_pnpm_store:
  game_engine_node_modules:
  game_engine_pnpm_store:
